name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r app/requirements.txt

      - name: Run basic app check
        run: |
          python -c "import app.main; print('App imports successfully')"

      - name: Build Docker image
        run: |
          docker build -t devops-project:latest .

  docker-deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-project:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-project:latest

deploy:
  needs: docker-deploy
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/devops-project:latest
          docker stop devops-project || true
          docker rm devops-project || true
          docker run -d --name devops-project -p 80:8000 \
            ${{ secrets.DOCKER_USERNAME }}/devops-project:latest